name: Generate Client

# 手動觸發：從指定的 OpenAPI 契約網址（預設線上 dev API 的 /openapi.yaml，可在觸發時換）
# 重新產生 Swift client、驗證編譯、commit + 打 tag + push。
# 版號自動算：抓目前最新 tag，依選擇的 bump 往上跳一位（獨立於 API repo 的版號序列）。
on:
  workflow_dispatch:
    inputs:
      spec_url:
        description: "OpenAPI 契約網址"
        type: string
        required: true
        default: "https://training-la-api-dev.wly.lol/openapi.yaml"
      bump:
        description: "版號要跳哪一位"
        type: choice
        required: true
        default: patch
        options:
          - major
          - minor
          - patch

permissions:
  contents: write

jobs:
  generate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 要完整 tag 歷史才能正確算出下一版

      - id: version
        name: Compute next version
        run: |
          latest="$(git tag --sort=-v:refname | head -1)"
          latest="${latest:-v0.0.0}"
          ver="${latest#v}"
          IFS='.' read -r major minor patch <<< "$ver"
          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          next="v${major}.${minor}.${patch}"
          echo "latest tag: $latest -> next: $next"
          echo "next=$next" >> "$GITHUB_OUTPUT"

      - name: Install openapi-generator
        run: brew install openapi-generator

      - name: Generate client from contract
        env:
          SPEC: ${{ inputs.spec_url }}
        run: ./gen.sh

      - name: Verify it builds
        run: swift build

      - name: Commit, tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -z "$(git status --porcelain)" ]; then
            echo "no changes from ${{ inputs.spec_url }} — skipping commit/tag"
            exit 0
          fi

          git add -A
          git commit -m "chore: regenerate from ${{ inputs.spec_url }}"
          git tag "${{ steps.version.outputs.next }}"
          git push origin HEAD:main
          git push origin "${{ steps.version.outputs.next }}"

      - name: Summary
        if: always()
        run: |
          echo "### Next version: ${{ steps.version.outputs.next }}" >> "$GITHUB_STEP_SUMMARY"
